version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: library-postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - library-network

  backend:
    build:
      context: ./backend

    container_name: library-backend

    restart: unless-stopped

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "8081:8081"

    networks:
      - library-network

  frontend:
    build:
      context: ./frontend

    container_name: library-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:80"

    networks:
      - library-network

volumes:
  postgres_data:

networks:
  library-network:
    driver: bridge